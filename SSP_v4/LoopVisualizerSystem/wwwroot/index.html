<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Trace Practice Board</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { min-height: 100vh; background: #101312; color: #dbe7df; padding: 22px; }
        .container { width: min(1380px, 100%); margin: 0 auto; display: grid; gap: 18px; }
        .header { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding-bottom: 4px; }
        .header h1 { color: #f5faf7; font-size: 22px; font-weight: 700; letter-spacing: 0; }
        .header-subtitle { color: #91a39a; font-size: 13px; }

        .top-row { display: grid; grid-template-columns: minmax(220px, 1fr) minmax(260px, 1.15fr) auto; gap: 12px; align-items: end; }
        .flow-field { display: grid; gap: 7px; min-width: 0; }
        .field-label { color: #91a39a; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
        select { width: 100%; min-height: 42px; background: #171b1a; color: #f3faf6; border: 1px solid #34423a; border-radius: 6px; padding: 10px 12px; font-size: 13px; outline: none; }
        select:focus { border-color: #68d391; box-shadow: 0 0 0 3px rgba(104, 211, 145, 0.14); }

        .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .surface { background: #171b1a; border: 1px solid #34423a; border-radius: 8px; overflow: hidden; }
        .surface-header { display: flex; align-items: center; justify-content: space-between; gap: 12px; min-height: 50px; padding: 12px 16px; background: #202724; border-bottom: 1px solid #34423a; color: #b7c9c0; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
        .surface-body { padding: 16px; color: #dbe7df; font-size: 14px; line-height: 1.6; }
        .surface-body strong { color: #ffffff; }

        .practice-layout { display: grid; grid-template-columns: minmax(520px, 1.1fr) minmax(340px, 0.9fr); gap: 18px; align-items: stretch; }
        .code-panel, .exercise-panel, .timeline-panel { min-width: 0; }
        .workspace-body { position: relative; width: 100%; height: 420px; background: #0c100f; display: flex; overflow: hidden; }
        .gutter-zone { width: 46px; height: 100%; flex: 0 0 46px; background: #090c0b; border-right: 1px solid #34423a; display: flex; flex-direction: column; padding: 20px 0; font-family: Consolas, "SFMono-Regular", monospace; font-size: 14px; line-height: 1.6; color: #607066; text-align: right; padding-right: 12px; user-select: none; overflow: hidden; }
        .gutter-num { height: 22.4px; }
        .gutter-num.active-num { color: #68d391; font-weight: 700; }
        .editor-stage { position: relative; flex: 1 1 auto; height: 100%; min-width: 0; }
        .code-editor { position: absolute; inset: 0; width: 100%; height: 100%; background: transparent; color: transparent; caret-color: #68d391; border: 0; padding: 20px; font-family: Consolas, "SFMono-Regular", monospace; font-size: 14px; line-height: 1.6; resize: none; outline: none; z-index: 3; white-space: pre; overflow: auto; }
        .code-viewer-container { position: absolute; inset: 0; padding: 20px; font-family: Consolas, "SFMono-Regular", monospace; font-size: 14px; line-height: 1.6; z-index: 1; pointer-events: none; white-space: pre; overflow: hidden; }
        .render-line-row { height: 22.4px; width: 100%; border-radius: 4px; transition: background 0.1s; color: #b9d8ff; }
        .render-line-row.active-row { background: rgba(104, 211, 145, 0.16); }

        .btn { min-height: 38px; background: #238636; color: #ffffff; border: 0; padding: 10px 18px; font-size: 13px; font-weight: 700; border-radius: 6px; cursor: pointer; transition: background 0.16s, transform 0.16s; white-space: nowrap; }
        .btn:hover:not(:disabled) { background: #2ea043; }
        .btn:active:not(:disabled) { transform: translateY(1px); }
        .btn:disabled { opacity: 0.55; cursor: not-allowed; }
        .secondary-btn { min-height: 38px; background: #252d2a; color: #e7f2ec; border: 1px solid #3f4e46; padding: 9px 13px; font-size: 12px; font-weight: 700; border-radius: 6px; cursor: pointer; white-space: nowrap; }
        .secondary-btn:hover:not(:disabled) { background: #2d3833; }
        .secondary-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .task-content { display: grid; gap: 14px; align-content: start; min-height: 420px; }
        .task-kicker { color: #68d391; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }
        .task-title { color: #ffffff; font-size: 21px; font-weight: 750; line-height: 1.25; }
        .task-objective { color: #dbe7df; font-size: 15px; line-height: 1.6; }
        .task-meta { display: flex; flex-wrap: wrap; gap: 8px; padding-top: 4px; }
        .task-pill { border: 1px solid #3f4e46; background: #101312; color: #b7c9c0; border-radius: 999px; padding: 6px 10px; font-size: 12px; font-weight: 700; }
        .blank-panel { display: grid; gap: 8px; padding: 12px; background: #101312; border: 1px solid #34423a; border-radius: 6px; }
        .blank-title { color: #f5faf7; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.4px; }
        .blank-help { color: #91a39a; font-size: 12px; line-height: 1.45; }
        .blank-row { display: grid; grid-template-columns: minmax(70px, 0.6fr) minmax(120px, 1fr) auto; gap: 8px; align-items: center; font-size: 12px; color: #dbe7df; }
        .blank-row span:first-child { font-family: Consolas, "SFMono-Regular", monospace; color: #f4c95d; }
        .blank-row strong { color: #f4c95d; text-transform: uppercase; font-size: 11px; }
        .blank-row.filled strong { color: #68d391; }
        .final-check-panel { display: grid; gap: 10px; padding-top: 14px; border-top: 1px solid #34423a; margin-top: 6px; }
        .final-check-title { color: #f5faf7; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.4px; }
        .final-question { display: grid; grid-template-columns: minmax(140px, 1fr) minmax(90px, 150px) auto; gap: 10px; align-items: center; background: #101312; border: 1px solid #34423a; border-radius: 6px; padding: 10px; }
        .final-question-prompt { color: #dbe7df; font-size: 13px; line-height: 1.4; }
        .final-answer-input { width: 100%; min-height: 36px; background: #171b1a; color: #ffffff; border: 1px solid #3f4e46; border-radius: 6px; padding: 8px 10px; font-family: Consolas, "SFMono-Regular", monospace; font-size: 13px; outline: none; }
        .final-answer-input:focus { border-color: #68d391; box-shadow: 0 0 0 3px rgba(104, 211, 145, 0.14); }
        .final-question-feedback { grid-column: 1 / -1; min-height: 18px; color: #91a39a; font-size: 12px; line-height: 1.45; }
        .final-question-feedback.good { color: #68d391; font-weight: 700; }
        .final-question-feedback.needs-work { color: #f4c95d; font-weight: 700; }
        .final-question-feedback.revealed { color: #dbe7df; }

        .timeline-panel { display: grid; }
        .timeline-body { display: grid; gap: 14px; padding: 16px; }
        .slider-control { display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: #334139; height: 6px; border-radius: 999px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 17px; height: 17px; border-radius: 50%; background: #68d391; border: 2px solid #101312; cursor: pointer; }
        .step-counter { color: #68d391; font-family: Consolas, "SFMono-Regular", monospace; font-size: 13px; font-weight: 700; min-width: 54px; text-align: right; }
        .trace-layout { display: grid; grid-template-columns: minmax(260px, 0.8fr) minmax(360px, 1.2fr); gap: 14px; align-items: stretch; }
        .trace-box { min-height: 190px; background: #101312; border: 1px solid #34423a; border-radius: 8px; overflow: hidden; }
        .box-title { padding: 10px 12px; background: #202724; border-bottom: 1px solid #34423a; color: #b7c9c0; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.4px; }
        .scope-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; padding: 12px; }
        .variable-card { background: #171b1a; border: 1px solid #34423a; border-radius: 6px; padding: 10px; font-size: 12px; font-family: Consolas, "SFMono-Regular", monospace; min-width: 0; }
        .variable-card .name, .variable-card .value { overflow-wrap: anywhere; }
        .console-container { padding: 12px; font-family: Consolas, "SFMono-Regular", monospace; font-size: 13px; min-height: 148px; max-height: 280px; overflow-y: auto; color: #e7f2ec; }
        .console-row { margin-bottom: 7px; white-space: pre-wrap; word-break: break-word; }
        .console-row.muted { color: #91a39a; font-style: italic; }
        .console-row.error { color: #ff7b72; font-weight: 700; margin-top: 8px; }
        .console-row.error-detail { color: #ffc2bd; margin-bottom: 8px; }
        .console-row.trace-head { color: #68d391; font-weight: 800; }
        .console-row.trace-line { color: #dbe7df; }
        .console-row.trace-meta { color: #b7c9c0; }
        .console-row.trace-change { color: #f4c95d; }
        .console-row.trace-output-label { color: #91a39a; border-top: 1px solid #34423a; margin-top: 10px; padding-top: 8px; text-transform: uppercase; font-size: 11px; letter-spacing: 0.4px; }
        .console-row.trace-explanation { color: #dbe7df; line-height: 1.58; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .console-row.trace-explanation code { background: rgba(255,255,255,0.06); padding: 2px 4px; border-radius: 3px; font-family: Consolas, "SFMono-Regular", monospace; }

        .utility-hidden { display: none; }
        .guide-overlay { position: fixed; inset: 0; display: none; background: transparent; z-index: 20; pointer-events: none; }
        .guide-overlay.visible { display: block; }
        .guide-card { position: fixed; left: 24px; top: 24px; width: min(400px, calc(100vw - 28px)); max-height: min(420px, calc(100vh - 28px)); overflow: auto; background: #171b1a; border: 1px solid #68d391; border-radius: 8px; box-shadow: 0 18px 52px rgba(0,0,0,0.58); padding: 18px; pointer-events: auto; }
        .guide-card h2 { color: #ffffff; font-size: 18px; margin-bottom: 10px; letter-spacing: 0; }
        .guide-card p { color: #dbe7df; font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
        .guide-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .guide-step { color: #91a39a; font-size: 12px; font-family: Consolas, "SFMono-Regular", monospace; }
        .guide-actions { display: flex; gap: 10px; }
        .guide-focus { position: relative; outline: 2px solid #68d391; outline-offset: 4px; box-shadow: 0 0 0 6px rgba(104, 211, 145, 0.13); z-index: 2; scroll-margin: 120px; }

        @media (max-width: 980px) {
            body { padding: 14px; }
            .header { align-items: flex-start; flex-direction: column; }
            .top-row, .info-row, .practice-layout, .trace-layout { grid-template-columns: 1fr; }
            .workspace-body, .task-content { min-height: 0; height: auto; }
            .workspace-body { height: 360px; }
            .slider-control { grid-template-columns: 1fr; }
            .step-counter { text-align: left; }
            .final-question { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>Python Trace Practice Board</h1>
        </div>
        <button class="secondary-btn" id="btn-open-guide">Guide</button>
    </div>

    <section class="top-row" aria-label="Task selection">
        <div class="flow-field">
            <label class="field-label" for="lesson-select">Topic</label>
            <select class="lesson-select" id="lesson-select"></select>
        </div>
        <div class="flow-field">
            <label class="field-label" for="example-select">Practice Task</label>
            <select class="example-select" id="example-select">
                <option value="accumulator-main">Build the sum</option>
            </select>
        </div>
        <button class="secondary-btn" id="btn-reset-view" type="button" hidden>Reset</button>
    </section>

    <section class="info-row">
        <section class="surface" id="knowledge-panel">
            <div class="surface-header">Knowledge Point</div>
            <div class="surface-body" id="topic-brief"></div>
        </section>
        <section class="surface" id="algorithm-panel">
            <div class="surface-header">Programming Algorithm</div>
            <div class="surface-body" id="algorithm-intro"></div>
        </section>
    </section>

    <section class="practice-layout">
        <section class="surface code-panel">
            <div class="surface-header">
                <span id="editor-title">Code</span>
                <button class="btn" id="btn-run">Compile & Run</button>
            </div>
            <div class="workspace-body">
                <div class="gutter-zone" id="gutter-zone"></div>
                <div class="editor-stage">
                    <textarea class="code-editor" id="code-input" spellcheck="false" wrap="off">total_sum = 0
numbers = [10, 20, 30]

for number in numbers:
    total_sum = number</textarea>
                    <div class="code-viewer-container" id="code-viewer"></div>
                </div>
            </div>
        </section>

        <section class="surface exercise-panel">
            <div class="surface-header">Practice Task</div>
            <div class="surface-body task-content" id="lesson-goal"></div>
        </section>
    </section>

    <section class="surface timeline-panel" id="timeline-panel">
        <div class="surface-header">Run Timeline</div>
        <div class="timeline-body">
            <div class="slider-control">
                <input type="range" id="trace-slider" min="0" max="0" value="0" disabled>
                <span class="step-counter" id="step-counter">0/0</span>
            </div>
            <div class="trace-layout">
                <div class="trace-box">
                    <div class="box-title">Variables</div>
                    <div class="scope-grid" id="scope-grid"></div>
                </div>
                <div class="trace-box">
                    <div class="box-title">Step Explanation</div>
                    <div class="console-container" id="console-output"></div>
                </div>
            </div>
        </div>
    </section>
</div>

<div class="utility-hidden" aria-hidden="true">
    <button id="btn-check-lesson" type="button"></button>
    <div id="lesson-status"></div>
    <div id="concept-panel"></div>
    <div id="teacher-insights"></div>
    <button id="btn-export-report" type="button"></button>
    <button id="btn-presentation-mode" type="button"></button>
    <input id="prediction-input" type="text">
    <div id="prediction-prompt"></div>
    <div id="prediction-feedback"></div>
    <button id="btn-check-prediction" type="button"></button>
    <button id="btn-reveal-answer" type="button"></button>
</div>

<div class="guide-overlay" id="guide-overlay" aria-modal="true" role="dialog">
    <div class="guide-card" id="guide-card">
        <h2 id="guide-title">Welcome</h2>
        <p id="guide-body">This short guide walks through one complete learning flow.</p>
        <div class="guide-footer">
            <span class="guide-step" id="guide-step">1 / 5</span>
            <div class="guide-actions">
                <button class="secondary-btn" id="btn-guide-skip">Skip</button>
                <button class="secondary-btn" id="btn-guide-prev">Previous</button>
                <button class="btn" id="btn-guide-next">Next</button>
            </div>
        </div>
    </div>
</div>

<script src="app.js?v=difficulty-topics-20260613"></script>
</body>
</html>
