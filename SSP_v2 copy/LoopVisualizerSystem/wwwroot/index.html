<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deterministic Python Loop Telemetry Board</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background-color: #0d1117; color: #c9d1d9; padding: 24px; display: flex; justify-content: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1300px; background: #161b22; border-radius: 12px; padding: 32px; border: 1px solid #30363d; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
        .header { text-align: center; margin-bottom: 24px; border-bottom: 1px solid #30363d; padding-bottom: 16px; }
        .header h1 { font-size: 20px; color: #58a6ff; letter-spacing: 1px; }
        .main-layout { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 24px; margin-bottom: 24px; }
        .panel { background: #0d1117; border-radius: 8px; border: 1px solid #30363d; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { background: #21262d; padding: 12px 20px; font-size: 13px; color: #8b949e; border-bottom: 1px solid #30363d; font-weight: 500; }
        
        /* 双层对齐重叠微型代码编辑器架构 */
        .workspace-body { position: relative; width: 100%; height: 380px; background: #0d1117; display: flex; overflow: hidden; }
        .gutter-zone { width: 45px; height: 100%; background: #090d13; border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 20px 0; font-family: monospace; font-size: 14px; line-height: 1.6; color: #5c6370; text-align: right; padding-right: 12px; user-select: none; }
        .gutter-num { height: 22.4px; }
        .gutter-num.active-num { color: #58a6ff; font-weight: bold; }
        
        .editor-stage { position: relative; flex-grow: 1; height: 100%; }
        .code-editor { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; color: transparent; caret-color: #58a6ff; border: none; padding: 20px; font-family: monospace; font-size: 14px; line-height: 1.6; resize: none; outline: none; z-index: 3; white-space: pre; overflow-x: auto; }
        .code-viewer-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; font-family: monospace; font-size: 14px; line-height: 1.6; z-index: 1; pointer-events: none; white-space: pre; overflow: hidden; }
        .render-line-row { height: 22.4px; width: 100%; border-radius: 3px; transition: background 0.1s; color: #79c0ff; }
        .render-line-row.active-row { background: rgba(56, 139, 253, 0.15); }

        /* 控制台排版优化，解决拥挤问题 */
        .console-container { padding: 20px; font-family: monospace; font-size: 13px; line-height: 1.8; background: #090d13; min-height: 200px; max-height: 200px; overflow-y: auto; color: #e6edf3; }
        .console-row { margin-bottom: 6px; white-space: pre-wrap; word-break: break-all; }

        .scope-container { padding: 16px; background: #0d1117; border-top: 1px solid #30363d; min-height: 180px; }
        .scope-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-top: 10px; }
        .variable-card { background: #21262d; border-radius: 6px; padding: 10px; font-size: 12px; font-family: monospace; transition: all 0.1s ease; }
        
        .interactive-panel { background: #21262d; border-radius: 8px; padding: 20px; border: 1px solid #30363d; margin-top: 24px; }
        .controls { display: flex; align-items: center; justify-content: space-between; gap: 20px; }
        .btn { background: #238636; color: white; border: none; padding: 12px 28px; font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #2ea043; }
        .slider-container { flex-grow: 1; display: flex; align-items: center; gap: 16px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: #30363d; height: 6px; border-radius: 3px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #58a6ff; cursor: pointer; }
        .explanation-card { margin-top: 16px; background: rgba(88, 166, 255, 0.05); border-left: 3px solid #58a6ff; padding: 16px; border-radius: 0 6px 6px 0; font-size: 13px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Dynamic Programming Flow & Variable Tracker Dashboard</h1>
    </div>

    <div class="main-layout">
        <div class="panel">
            <div class="panel-header" id="editor-title">STUDENT WORKSPACE EDITOR</div>
            <div class="workspace-body">
                <div class="gutter-zone" id="gutter-zone"></div>
                <div class="editor-stage">
                    <textarea class="code-editor" id="code-input" spellcheck="false" wrap="off">total_sum = 0
multipliers = [1, 2, 3]

for factor in multipliers:
    result = factor * 10
    total_sum += result</textarea>
                    <div class="code-viewer-container" id="code-viewer"></div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">REAL-TIME TELEMETRY CONSOLE</div>
            <div class="console-container" id="console-output"></div>
            
            <div class="scope-container">
                <div style="font-size: 12px; font-weight: 600; color: #8b949e;">VARIABLE STATE MATRIX (MEMORY)</div>
                <div class="scope-grid" id="scope-grid"></div>
            </div>
        </div>
    </div>

    <div class="interactive-panel">
        <div class="controls">
            <button class="btn" id="btn-run">Compile & Trace</button>
            <div class="slider-container">
                <span style="font-size: 13px; color: #8b949e; white-space: nowrap;">Time-Travel Debugger:</span>
                <input type="range" id="trace-slider" min="0" max="0" value="0" disabled>
                <span style="font-size: 13px; color: #3fb950; font-family: monospace;" id="step-counter">Steps: 0/0</span>
            </div>
        </div>
        <div class="explanation-card" id="explanation-text">
            Input code block on the left editor space, then execute <strong>[Compile & Trace]</strong> to generate the timeline logs.
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
