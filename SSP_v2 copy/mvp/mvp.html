<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Python Loop Engine — Nested & Consecutive Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            background: #161b22;
            border-radius: 12px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
            padding: 32px;
            border: 1px solid #30363d;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
            border-bottom: 1px solid #30363d;
            padding-bottom: 16px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 600;
            color: #58a6ff;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: #0d1117;
            border-radius: 8px;
            border: 1px solid #30363d;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            background: #21262d;
            padding: 12px 20px;
            font-weight: 500;
            font-size: 13px;
            color: #8b949e;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #30363d;
        }

        .dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .dot-red { background: #f85149; }
        .dot-yellow { background: #d29922; }
        .dot-green { background: #3fb950; }

        .code-editor {
            width: 100%;
            height: 320px;
            background: #0d1117;
            color: #79c0ff;
            border: none;
            padding: 20px;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            resize: none;
            outline: none;
        }

        .console-container {
            padding: 20px;
            font-family: 'Fira Code', 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            background: #090d13;
            flex-grow: 1;
            min-height: 320px;
            max-height: 320px;
            overflow-y: auto;
        }

        .console-line {
            color: #c9d1d9;
            margin-bottom: 4px;
            white-space: pre-wrap;
        }

        .console-line.system { color: #8b949e; font-style: italic; }
        .console-line.outer { color: #ff7b72; font-weight: 500; }
        .console-line.inner { color: #79c0ff; padding-left: 16px; }
        .console-line.success { color: #56d364; font-weight: 600; }
        .console-line.error { color: #f85149; font-weight: 500; }

        .interactive-panel {
            background: #21262d;
            border-radius: 8px;
            padding: 20px;
            border: 1px solid #30363d;
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
        }

        .btn {
            background: #1f6feb;
            color: #ffffff;
            border: none;
            padding: 10px 24px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        .btn:hover { background: #388bfd; }
        .btn:active { transform: scale(0.98); }

        .slider-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 280px;
        }

        .slider-label {
            font-size: 13px;
            font-weight: 500;
            color: #8b949e;
            white-space: nowrap;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: #30363d;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #58a6ff;
            cursor: pointer;
        }

        .progress-bar-container {
            margin-top: 20px;
            background: #0d1117;
            border-radius: 6px;
            padding: 12px 20px;
            border: 1px solid #30363d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .progress-track {
            flex-grow: 1;
            background: #30363d;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #3fb950;
            width: 0%;
            transition: width 0.1s ease;
        }

        .progress-stats {
            font-family: monospace;
            font-size: 13px;
            color: #3fb950;
            white-space: nowrap;
            font-weight: 500;
        }

        .explanation-card {
            margin-top: 16px;
            background: rgba(88, 166, 255, 0.05);
            border-left: 3px solid #58a6ff;
            padding: 16px;
            border-radius: 0 6px 6px 0;
            font-size: 13px;
            line-height: 1.6;
            color: #c9d1d9;
        }

        .explanation-card span {
            font-weight: 600;
            color: #d29922;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Advanced Python Loop Engine</h1>
    </div>

    <div class="main-layout">
        <div class="panel">
            <div class="panel-header">
                <div class="dots">
                    <div class="dot dot-red"></div>
                    <div class="dot dot-yellow"></div>
                    <div class="dot dot-green"></div>
                </div>
                <span>Workspace Editor (Nested Loops Script)</span>
            </div>
            <textarea class="code-editor" id="code-input" spellcheck="false"># Pre-loaded with an elegant multi-task nested loop structure
epochs = ["Epoch 1", "Epoch 2"]
batches = ["Batch A", "Batch B", "Batch C"]

for epoch in epochs:
    print(f"[Outer] Starting: {epoch}")
    for batch in batches:
        print(f"[Inner] Executing: {batch}")</textarea>
        </div>

        <div class="panel">
            <div class="panel-header">
                <span>RUNTIME CONSOLE OUTPUT</span>
                <span id="loop-status" style="color: #3fb950; font-size: 12px; font-weight: 500;">Ready</span>
            </div>
            <div class="console-container" id="console-output"></div>
        </div>
    </div>

    <div class="interactive-panel">
        <div class="controls">
            <button class="btn" id="btn-compile" style="background: #238636;">Compile & Run Pipeline</button>
            
            <div class="slider-container">
                <span class="slider-label">Timeline Control (Step Slider):</span>
                <input type="range" id="loop-slider" min="0" max="0" value="0" disabled>
            </div>
        </div>

        <div class="progress-bar-container">
            <span style="font-size: 13px; font-weight: 600; color: #8b949e;">Execution Progress Trace</span>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-stats" id="progress-stats">Total Steps: 0 / 0</div>
        </div>

        <div class="explanation-card" id="explanation-text">
            Click <strong>[Compile & Run Pipeline]</strong> to parse the advanced loop logic block.
        </div>
    </div>
</div>

<script>
    let runtimeSteps = [];

    const codeInput = document.getElementById('code-input');
    const consoleOutput = document.getElementById('console-output');
    const slider = document.getElementById('loop-slider');
    const progressFill = document.getElementById('progress-fill');
    const progressStats = document.getElementById('progress-stats');
    const explanationText = document.getElementById('explanation-text');
    const loopStatus = document.getElementById('loop-status');
    const btnCompile = document.getElementById('btn-compile');

    // Advanced Static Code Analysis Engine to trace lines accurately
    function parseAndGenerateTimeline() {
        const codeText = codeInput.value;
        runtimeSteps = [];

        // Helper to extract element values inside lists safely
        function extractList(varName) {
            const regex = new RegExp(varName + '\\s*=\\s*\\[([\\s\\S]*?)\\]');
            const match = codeText.match(regex);
            if (!match) return null;
            const strRegex = /(?:"([^"\\]*(?:\\.[^"\\]*)*)"|'([^'\\]*(?:\\.[^'\\]*)*)')/g;
            let m, res = [];
            while ((m = strRegex.exec(match[1])) !== null) {
                res.push(m[1] !== undefined ? m[1] : m[2]);
            }
            return res;
        }

        // Checking if the mode is Nested Loop or Consecutive Loop
        if (codeText.includes('for batch in batches:') && codeText.includes('for epoch in epochs:')) {
            // Nested Mode
            const epochs = extractList('epochs') || ["Epoch 1", "Epoch 2"];
            const batches = extractList('batches') || ["Batch A", "Batch B", "Batch C"];

            epochs.forEach(e => {
                runtimeSteps.push({
                    type: 'outer',
                    text: `[Outer Loop] Entering -> ${e}`,
                    desc: `The interpreter advances the outer loop handle, assigning <span>"${e}"</span> to the reference variable <code>epoch</code>.`
                });
                batches.forEach(b => {
                    runtimeSteps.push({
                        type: 'inner',
                        text: `  [Inner Loop] Executing Sub-task -> ${b}`,
                        desc: `Inside the active block, the inner loop fires. The item variable <code>batch</code> holds <span>"${b}"</span>.`
                    });
                });
            });
        } 
        else if (codeText.includes('for model in models:') && codeText.includes('for dataset in datasets:')) {
            // Consecutive Mode
            const datasets = extractList('datasets') || ["Train Set", "Val Set"];
            const models = extractList('models') || ["ResNet", "U-Net"];

            datasets.forEach(d => {
                runtimeSteps.push({
                    type: 'outer',
                    text: `[First Loop] Loading Dataset -> ${d}`,
                    desc: `The <span>First independent loop</span> starts iterating over the dataset matrix, loading <span>"${d}"</span>.`
                });
            });
            runtimeSteps.push({
                type: 'system',
                text: `>>> First Loop Finished. Diverting execution control to the next structure block...`,
                desc: `The first loop finishes execution smoothly. Control flow steps directly into the adjacent loop structure block.`
            });
            models.forEach(m => {
                runtimeSteps.push({
                    type: 'inner',
                    text: `[Second Loop] Deploying Network Model -> ${m}`,
                    desc: `The <span>Second independent loop</span> initializes. The interpreter references structural asset: <span>"${m}"</span>.`
                });
            });
        }
        else {
            // Generic Error Handler if patterns don't match pre-defined presentation metrics
            consoleOutput.innerHTML = `<div class="console-line error">Compilation Notice: To demonstrate complex controls, please utilize the pre-loaded presentation structures (Nested/Consecutive) or tweak their array contents.</div>`;
            slider.disabled = true;
            return;
        }

        slider.max = runtimeSteps.length;
        slider.value = 0;
        slider.disabled = false;
        loopStatus.textContent = "Pipeline Active";
        loopStatus.style.color = "#3fb950";

        renderState(0);
    }

    function renderState(step) {
        consoleOutput.innerHTML = '';
        
        const baseLine = document.createElement('div');
        baseLine.className = 'console-line system';
        baseLine.textContent = `>>> [Runtime State]: Analytical telemetry pipeline running...`;
        consoleOutput.appendChild(baseLine);

        for (let i = 0; i < step; i++) {
            const current = runtimeSteps[i];
            const div = document.createElement('div');
            div.className = `console-line ${current.type}`;
            div.textContent = current.text;
            consoleOutput.appendChild(div);
        }

        const percentage = (step / runtimeSteps.length) * 100;
        progressFill.style.width = `${percentage}%`;
        progressStats.textContent = `Trace Matrix: ${step} / ${runtimeSteps.length} Steps`;

        if (step === 0) {
            explanationText.innerHTML = `Timeline standby. Drag the <strong>Step Slider</strong> to watch how Python navigates multidimensional control boundaries line-by-line.`;
        } else if (step <= runtimeSteps.length) {
            explanationText.innerHTML = runtimeSteps[step - 1].desc;
        }

        if (step === runtimeSteps.length && runtimeSteps.length > 0) {
            const completionLine = document.createElement('div');
            completionLine.className = 'console-line success';
            completionLine.style.marginTop = '8px';
            completionLine.textContent = `--- [Complex Pipeline Execution Finished Gracefully] ---`;
            consoleOutput.appendChild(completionLine);
        }

        consoleOutput.scrollTop = consoleOutput.scrollHeight;
    }

    btnCompile.addEventListener('click', parseAndGenerateTimeline);
    slider.addEventListener('input', (e) => {
        renderState(parseInt(e.target.value));
    });

    parseAndGenerateTimeline();
</script>

</body>
</html>
